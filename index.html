<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Viral</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: Arial;
  background: black;
}

/* WRAPPER */
.wrapper {
  height: 100vh;
  overflow-y: scroll;
  scroll-snap-type: y mandatory;
  scroll-behavior: smooth;
}

/* SLIDE */
.slide {
  position: relative;
  height: 100vh;
  scroll-snap-align: start;
}

/* VIDEO */
video {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* PROGRESS BAR */
.progress {
  position: absolute;
  top: 0;
  left: 0;
  height: 3px;
  width: 0%;
  background: red;
  z-index: 10;
}

/* UI kanan */
.ui {
  position: absolute;
  right: 12px;
  bottom: 90px;
  color: white;
  text-align: center;
}

.ui div {
  margin: 18px 0;
  font-size: 16px;
  cursor: pointer;
}

/* LIKE ANIMATION */
.liked {
  transform: scale(1.3);
  transition: 0.2s;
}

/* bawah kiri */
.bottom {
  position: absolute;
  bottom: 20px;
  left: 12px;
  color: white;
}

/* CENTER CTA */
.centerBox {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  color: white;
}

/* BUTTON */
button {
  padding: 14px 30px;
  border-radius: 30px;
  border: none;
  margin-top: 12px;
  font-size: 16px;
  background: red;
  color: white;
  cursor: pointer;
  animation: pulse 1.5s infinite;
}

@keyframes pulse {
  0% {transform: scale(1);}
  50% {transform: scale(1.08);}
  100% {transform: scale(1);}
}

/* KOMENTAR */
#commentBox {
  position: fixed;
  bottom: -100%;
  width: 100%;
  background: white;
  color: black;
  padding: 20px;
  border-radius: 15px 15px 0 0;
  transition: 0.3s;
}

#commentBox.show {
  bottom: 0;
}

/* DOUBLE TAP LIKE */
.heart {
  position: absolute;
  font-size: 80px;
  color: white;
  opacity: 0;
  transform: scale(0);
  pointer-events: none;
}

.heart.show {
  animation: pop 0.6s ease;
}

@keyframes pop {
  0% {opacity:0; transform: scale(0);}
  50% {opacity:1; transform: scale(1.3);}
  100% {opacity:0; transform: scale(1);}
}
</style>
</head>

<body>

<div class="wrapper">

  <!-- SLIDE 1 -->
  <div class="slide" ondblclick="doubleLike(this)">
    <div class="progress"></div>
    <div class="heart">❤️</div>

    <video autoplay muted loop playsinline>
      <source src="copy_E8BDE56E-83B1-4FD4-A0D6-B4DE819C7DC5.mov">
    </video>

    <div class="ui">
      <div onclick="like(this)">❤️<br><span>120</span></div>
      <div onclick="openComment()">💬</div>
      <div onclick="toggleSound(this)">🔊</div>
    </div>

    <div class="bottom">
      <h3>@AldyPrayogaa</h3>
      <p>🔥 Jangan skip video ini 😱, Slide ke bawah 🫵🏻</p>
    </div>
  </div>

  <!-- SLIDE 2 -->
  <div class="slide">
    <video autoplay muted loop playsinline>
      <source src="copy_0A0A5A63-57E2-4E95-A366-6D92A5F6AA96.mp4">
    </video>

    <div class="centerBox">
      <h2>🔥 Support Dulu 🔥</h2>
      <p>Subscribe biar gak ketinggalan</p>

      <a href="https://www.youtube.com/@AldyPrayogaa?sub_confirmation=1" target="_blank">
        <button>SUBSCRIBE</button>
      </a>
    </div>
  </div>

</div>

<!-- KOMENTAR -->
<div id="commentBox">
  <h3>Komentar</h3>
  <p>Keren banget 🔥</p>
  <p>Gue langsung subscribe 😎</p>
  <p>Ini viral sih 😱</p>
  <button onclick="closeComment()">Tutup</button>
</div>

<script>

// LIKE BUTTON
function like(el) {
  let span = el.querySelector("span");
  let val = parseInt(span.innerText);
  span.innerText = val + 1;

  el.classList.add("liked");
  setTimeout(()=>el.classList.remove("liked"),200);

  vibrate();
}

// DOUBLE TAP LIKE
function doubleLike(slide) {
  let heart = slide.querySelector(".heart");
  heart.classList.add("show");
  setTimeout(()=>heart.classList.remove("show"),600);

  vibrate();
}

// KOMENTAR
function openComment() {
  document.getElementById("commentBox").classList.add("show");
}

function closeComment() {
  document.getElementById("commentBox").classList.remove("show");
}

// SOUND
function toggleSound(el) {
  let vid = el.closest(".slide").querySelector("video");
  vid.muted = !vid.muted;
}

// HAPTIC
function vibrate() {
  if (navigator.vibrate) navigator.vibrate(50);
}

// AUTO PLAY + PROGRESS
const slides = document.querySelectorAll(".slide");

slides.forEach(slide => {
  let video = slide.querySelector("video");
  let bar = slide.querySelector(".progress");

  video.addEventListener("timeupdate", () => {
    let percent = (video.currentTime / video.duration) * 100;
    if(bar) bar.style.width = percent + "%";
  });
});

// INTERSECTION OBSERVER
const videos = document.querySelectorAll("video");

const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    let vid = entry.target;

    if (entry.isIntersecting) {
      vid.play();

      // preload next video
      let next = vid.closest(".slide").nextElementSibling;
      if(next){
        let nextVid = next.querySelector("video");
        nextVid.preload = "auto";
      }

    } else {
      vid.pause();
    }
  });
}, { threshold: 0.6 });

videos.forEach(v => observer.observe(v));

</script>

</body>
</html>
