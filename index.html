<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Viral</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: Arial;
  background: black;
}

.wrapper {
  height: 100vh;
  overflow-y: scroll;
  scroll-snap-type: y mandatory;
}

.slide {
  position: relative;
  height: 100vh;
  scroll-snap-align: start;
}

video {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* UI kanan */
.ui {
  position: absolute;
  right: 12px;
  bottom: 90px;
  color: white;
  text-align: center;
}

.ui div {
  margin: 18px 0;
  font-size: 16px;
  cursor: pointer;
}

/* bawah */
.bottom {
  position: absolute;
  bottom: 20px;
  left: 12px;
  color: white;
}

/* tombol */
button {
  padding: 12px 25px;
  border-radius: 30px;
  border: none;
  margin-top: 10px;
  font-size: 16px;
}

/* komentar */
#commentBox {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: white;
  color: black;
  display: none;
  padding: 20px;
  border-radius: 15px 15px 0 0;
}
</style>
</head>

<body>

<div class="wrapper">

  <!-- SLIDE 1 -->
  <div class="slide">
    <video autoplay muted loop playsinline>
      <source src="copy_E8BDE56E-83B1-4FD4-A0D6-B4DE819C7DC5.mov" type="video/quicktime">
    </video>

    <div class="ui">
      <div onclick="like(this)">❤️<br><span>120</span></div>
      <div onclick="openComment()">💬</div>
      <div onclick="toggleSound(this)">🔊</div>
    </div>

    <div class="bottom">
      <h3>@AldyPrayogaa</h3>
      <p>🔥 Jangan skip video ini 😱</p>
    </div>
  </div>

  <!-- SLIDE 2 -->
  <div class="slide">
    <video autoplay muted loop playsinline>
      <source src="copy_0A0A5A63-57E2-4E95-A366-6D92A5F6AA96.mp4" type="video/mp4">
    </video>

    <div class="bottom">
      <h2>🔥 Support Dulu 🔥</h2>
      <p>Subscribe biar gak ketinggalan</p>

      <a href="https://www.youtube.com/@AldyPrayogaa?sub_confirmation=1" target="_blank">
        <button>SUBSCRIBE</button>
      </a>
    </div>
  </div>

</div>

<!-- komentar -->
<div id="commentBox">
  <h3>Komentar</h3>
  <p>Keren banget 🔥</p>
  <p>Gue langsung subscribe 😎</p>
  <p>Ini viral sih 😱</p>
  <button onclick="closeComment()">Tutup</button>
</div>

<script>

// LIKE
function like(el) {
  let span = el.querySelector("span");
  let val = parseInt(span.innerText);
  span.innerText = val + 1;
}

// KOMENTAR
function openComment() {
  document.getElementById("commentBox").style.display = "block";
}

function closeComment() {
  document.getElementById("commentBox").style.display = "none";
}

// SOUND
function toggleSound(el) {
  let vid = el.closest(".slide").querySelector("video");
  vid.muted = !vid.muted;
}

// AUTO PLAY / PAUSE
const videos = document.querySelectorAll("video");

const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      entry.target.play();
    } else {
      entry.target.pause();
    }
  });
}, { threshold: 0.6 });

videos.forEach(v => observer.observe(v));

</script>

</body>
</html>
